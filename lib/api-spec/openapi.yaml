openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: lokalradar
    description: LokalRadar competitor monitoring & marketing operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /lokalradar/overview:
    get:
      operationId: getLokalOverview
      tags: [lokalradar]
      summary: Dashboard summary for LokalRadar
      responses:
        "200":
          description: Overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LokalOverview"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /lokalradar/business:
    get:
      operationId: getLokalBusiness
      tags: [lokalradar]
      summary: Get the signed-in user's business profile
      responses:
        "200":
          description: Business
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LokalBusiness"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      operationId: updateLokalBusiness
      tags: [lokalradar]
      summary: Create or update the business profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LokalBusinessInput"
      responses:
        "200":
          description: Updated business
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LokalBusiness"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /lokalradar/competitors:
    get:
      operationId: listLokalCompetitors
      tags: [lokalradar]
      summary: List tracked competitors
      responses:
        "200":
          description: Competitor list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LokalCompetitorList"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createLokalCompetitor
      tags: [lokalradar]
      summary: Add a competitor to track
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LokalCompetitorInput"
      responses:
        "201":
          description: Created competitor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LokalCompetitor"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Plan competitor limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /lokalradar/competitors/{id}:
    get:
      operationId: getLokalCompetitor
      tags: [lokalradar]
      summary: Competitor detail with snapshots, changes and trends
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Competitor detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LokalCompetitorDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteLokalCompetitor
      tags: [lokalradar]
      summary: Stop tracking a competitor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /lokalradar/alerts:
    get:
      operationId: listLokalAlerts
      tags: [lokalradar]
      summary: List alerts
      responses:
        "200":
          description: Alert list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LokalAlertList"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /lokalradar/alerts/{id}:
    patch:
      operationId: updateLokalAlert
      tags: [lokalradar]
      summary: Mark an alert read or unread
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LokalAlertUpdate"
      responses:
        "200":
          description: Updated alert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LokalAlert"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /lokalradar/generations:
    get:
      operationId: listLokalGenerations
      tags: [lokalradar]
      summary: List AI-generated marketing content
      responses:
        "200":
          description: Generation list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LokalGenerationList"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /lokalradar/competitors/{id}/scan:
    post:
      operationId: scanLokalCompetitor
      tags: [lokalradar]
      summary: Run a scan for a competitor now
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Scan result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LokalScanResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /lokalradar/generate/posts:
    post:
      operationId: generateLokalPosts
      tags: [lokalradar]
      summary: Generate ready-to-post marketing drafts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LokalPostInput"
      responses:
        "200":
          description: Generated posts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LokalPostResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Generation limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /lokalradar/reviews:
    get:
      operationId: listLokalReviews
      tags: [lokalradar]
      summary: List reviews available to the reply assistant
      responses:
        "200":
          description: Review list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LokalReviewList"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createLokalReview
      tags: [lokalradar]
      summary: Manually add a review to reply to
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LokalReviewInput"
      responses:
        "201":
          description: Created review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LokalReview"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /lokalradar/generate/review-reply:
    post:
      operationId: generateLokalReviewReply
      tags: [lokalradar]
      summary: Suggest a professional reply to a review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LokalReviewReplyInput"
      responses:
        "200":
          description: Suggested reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LokalReviewReplyResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Generation limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /lokalradar/generate/post-image:
    post:
      operationId: generateLokalPostImage
      tags: [lokalradar]
      summary: Generate an AI image for a marketing post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LokalPostImageInput"
      responses:
        "200":
          description: Generated image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LokalPostImageResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Generation limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /lokalradar/reviews/import-google:
    post:
      operationId: importLokalGoogleReviews
      tags: [lokalradar]
      summary: Import the user's reviews from their Google profile
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LokalReviewImportResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "400":
          description: Missing Google profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Google integration not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /lokalradar/generate/seo:
    post:
      operationId: generateLokalSeo
      tags: [lokalradar]
      summary: Generate SEO/website suggestions for the user's site
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LokalSeoInput"
      responses:
        "200":
          description: SEO suggestions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LokalSeoResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Generation limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  responses:
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    OkResult:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok
    LokalBusiness:
      type: object
      properties:
        id: { type: string }
        name: { type: ["string", "null"] }
        orgNumber: { type: ["string", "null"] }
        industry: { type: ["string", "null"] }
        location: { type: ["string", "null"] }
        website: { type: ["string", "null"] }
        googlePlaceId: { type: ["string", "null"] }
        notifyEmail: { type: boolean }
        notifyInApp: { type: boolean }
        alertFrequency: { type: string }
        onboardingCompleted: { type: boolean }
        plan: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required:
        - id
        - name
        - orgNumber
        - industry
        - location
        - website
        - googlePlaceId
        - notifyEmail
        - notifyInApp
        - alertFrequency
        - onboardingCompleted
        - plan
        - createdAt
        - updatedAt
    LokalBusinessInput:
      type: object
      properties:
        name: { type: string }
        orgNumber: { type: ["string", "null"] }
        industry: { type: ["string", "null"] }
        location: { type: ["string", "null"] }
        website: { type: ["string", "null"] }
        googlePlaceId: { type: ["string", "null"] }
        notifyEmail: { type: boolean }
        notifyInApp: { type: boolean }
        alertFrequency: { type: string }
        onboardingCompleted: { type: boolean }
    LokalCompetitor:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        website: { type: ["string", "null"] }
        googlePlaceId: { type: ["string", "null"] }
        location: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        status: { type: string }
        lastError: { type: ["string", "null"] }
        lastCheckedAt: { type: ["string", "null"], format: date-time }
        lastChangeAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }
      required:
        - id
        - name
        - website
        - googlePlaceId
        - location
        - notes
        - status
        - lastError
        - lastCheckedAt
        - lastChangeAt
        - createdAt
    LokalCompetitorInput:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        website: { type: ["string", "null"] }
        googlePlaceId: { type: ["string", "null"] }
        location: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
      required:
        - name
    LokalCompetitorList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/LokalCompetitor"
      required:
        - items
    LokalAlert:
      type: object
      properties:
        id: { type: string }
        type: { type: string }
        severity: { type: string }
        title: { type: string }
        body: { type: ["string", "null"] }
        competitorId: { type: ["string", "null"] }
        read: { type: boolean }
        createdAt: { type: string, format: date-time }
      required:
        - id
        - type
        - severity
        - title
        - body
        - competitorId
        - read
        - createdAt
    LokalAlertUpdate:
      type: object
      properties:
        read: { type: boolean }
      required:
        - read
    LokalAlertList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/LokalAlert"
        unreadCount: { type: integer }
      required:
        - items
        - unreadCount
    LokalOverview:
      type: object
      properties:
        competitorCount: { type: integer }
        unreadAlertCount: { type: integer }
        generationCountThisMonth: { type: integer }
        reviewCount: { type: integer }
        plan: { type: string }
        competitorLimit: { type: ["integer", "null"] }
        generationLimit: { type: ["integer", "null"] }
      required:
        - competitorCount
        - unreadAlertCount
        - generationCountThisMonth
        - reviewCount
        - plan
        - competitorLimit
        - generationLimit
    LokalGeneration:
      type: object
      properties:
        id: { type: string }
        kind: { type: string }
        channel: { type: ["string", "null"] }
        prompt: { type: ["string", "null"] }
        content: { type: string }
        createdAt: { type: string, format: date-time }
      required:
        - id
        - kind
        - channel
        - prompt
        - content
        - createdAt
    LokalGenerationList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/LokalGeneration"
      required:
        - items
    LokalPostInput:
      type: object
      properties:
        channel: { type: string }
        industry: { type: ["string", "null"] }
        season: { type: ["string", "null"] }
        tone: { type: ["string", "null"] }
        keywords: { type: ["string", "null"] }
      required:
        - channel
    LokalPostResult:
      type: object
      properties:
        posts:
          type: array
          items: { type: string }
        generation: { $ref: "#/components/schemas/LokalGeneration" }
      required:
        - posts
        - generation
    LokalReviewList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/LokalReview"
      required:
        - items
    LokalReviewInput:
      type: object
      properties:
        author: { type: ["string", "null"] }
        rating: { type: ["integer", "null"] }
        text: { type: string, minLength: 1 }
        source: { type: ["string", "null"] }
      required:
        - text
    LokalReviewReplyInput:
      type: object
      properties:
        reviewId: { type: string }
      required:
        - reviewId
    LokalReviewReplyResult:
      type: object
      properties:
        reply: { type: string }
        generation: { $ref: "#/components/schemas/LokalGeneration" }
      required:
        - reply
        - generation
    LokalPostImageInput:
      type: object
      properties:
        post: { type: string, minLength: 1 }
        channel: { type: string }
      required:
        - post
    LokalPostImageResult:
      type: object
      properties:
        image: { type: string }
        generation: { $ref: "#/components/schemas/LokalGeneration" }
      required:
        - image
        - generation
    LokalReviewImportResult:
      type: object
      properties:
        imported: { type: integer }
        total: { type: integer }
        message: { type: string }
      required:
        - imported
        - total
        - message
    LokalSeoInput:
      type: object
      properties:
        url: { type: string, minLength: 1 }
      required:
        - url
    LokalSeoResult:
      type: object
      properties:
        url: { type: string }
        suggestions: { type: string }
        generation: { $ref: "#/components/schemas/LokalGeneration" }
      required:
        - url
        - suggestions
        - generation
    LokalPrice:
      type: object
      properties:
        label: { type: string }
        amount: { type: ["number", "null"] }
        currency: { type: ["string", "null"] }
        raw: { type: ["string", "null"] }
      required: [label, amount, currency, raw]
    LokalWebData:
      type: object
      properties:
        prices:
          type: array
          items: { $ref: "#/components/schemas/LokalPrice" }
        offers:
          type: array
          items: { type: string }
        promotions:
          type: array
          items: { type: string }
        services:
          type: array
          items: { type: string }
        summary: { type: ["string", "null"] }
      required: [prices, offers, promotions, services, summary]
    LokalReviewItem:
      type: object
      properties:
        author: { type: ["string", "null"] }
        rating: { type: ["number", "null"] }
        text: { type: ["string", "null"] }
        time: { type: ["string", "null"], format: date-time }
        relativeTime: { type: ["string", "null"] }
      required: [author, rating, text, time, relativeTime]
    LokalReviewData:
      type: object
      properties:
        rating: { type: ["number", "null"] }
        reviewCount: { type: ["integer", "null"] }
        reviews:
          type: array
          items: { $ref: "#/components/schemas/LokalReviewItem" }
      required: [rating, reviewCount, reviews]
    LokalReview:
      type: object
      properties:
        id: { type: string }
        competitorId: { type: ["string", "null"] }
        source: { type: ["string", "null"] }
        author: { type: ["string", "null"] }
        rating: { type: ["integer", "null"] }
        text: { type: ["string", "null"] }
        reviewedAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }
      required: [id, competitorId, source, author, rating, text, reviewedAt, createdAt]
    LokalScanResult:
      type: object
      properties:
        status: { type: string }
        message: { type: ["string", "null"] }
        createdAlerts: { type: integer }
        competitor: { $ref: "#/components/schemas/LokalCompetitor" }
        latestWeb:
          oneOf:
            - $ref: "#/components/schemas/LokalWebData"
            - type: "null"
        latestReviews:
          oneOf:
            - $ref: "#/components/schemas/LokalReviewData"
            - type: "null"
      required: [status, message, createdAlerts, competitor, latestWeb, latestReviews]
    LokalRatingPoint:
      type: object
      properties:
        capturedAt: { type: string, format: date-time }
        rating: { type: ["number", "null"] }
        reviewCount: { type: ["integer", "null"] }
      required: [capturedAt, rating, reviewCount]
    LokalPricePoint:
      type: object
      properties:
        capturedAt: { type: string, format: date-time }
        minPrice: { type: ["number", "null"] }
        avgPrice: { type: ["number", "null"] }
      required: [capturedAt, minPrice, avgPrice]
    LokalCompetitorDetail:
      type: object
      properties:
        competitor: { $ref: "#/components/schemas/LokalCompetitor" }
        latestWeb:
          oneOf:
            - $ref: "#/components/schemas/LokalWebData"
            - type: "null"
        latestReviews:
          oneOf:
            - $ref: "#/components/schemas/LokalReviewData"
            - type: "null"
        alerts:
          type: array
          items: { $ref: "#/components/schemas/LokalAlert" }
        reviews:
          type: array
          items: { $ref: "#/components/schemas/LokalReview" }
        ratingHistory:
          type: array
          items: { $ref: "#/components/schemas/LokalRatingPoint" }
        priceHistory:
          type: array
          items: { $ref: "#/components/schemas/LokalPricePoint" }
      required: [competitor, latestWeb, latestReviews, alerts, reviews, ratingHistory, priceHistory]
