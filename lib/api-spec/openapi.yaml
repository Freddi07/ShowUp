openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: appointments
    description: Appointment operations
  - name: customers
    description: Customer operations
  - name: stats
    description: Statistics operations
  - name: settings
    description: Notification settings
  - name: account
    description: Account operations
  - name: replies
    description: Customer reply operations
  - name: templates
    description: Message template operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /me:
    get:
      operationId: getMe
      tags: [account]
      summary: Current signed-in user
      responses:
        "200":
          description: The authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      operationId: deleteAccount
      tags: [account]
      summary: Permanently delete the signed-in user's account
      responses:
        "200":
          description: Account deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /appointments:
    get:
      operationId: listAppointments
      tags: [appointments]
      summary: List appointments for the signed-in business
      responses:
        "200":
          description: Appointment list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentList"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /appointments/{id}:
    patch:
      operationId: updateAppointment
      tags: [appointments]
      summary: Update an appointment's status or timing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentUpdate"
      responses:
        "200":
          description: Updated appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentActionResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /appointments/{id}/remind:
    post:
      operationId: remindAppointment
      tags: [appointments]
      summary: Send an SMS reminder for an appointment now
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RemindRequest"
      responses:
        "200":
          description: Reminder sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentActionResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: SMS delivery failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Customer detail with appointment history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Customer detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Reminder & response statistics
      responses:
        "200":
          description: Statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /svar:
    get:
      operationId: listReplies
      tags: [replies]
      summary: List customer replies to reminders
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ReplyStatusFilter"
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Reply list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplyList"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /svar/{id}:
    patch:
      operationId: updateReply
      tags: [replies]
      summary: Update a reply's status or send a follow-up
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplyUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: SMS delivery failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /maler:
    get:
      operationId: listTemplates
      tags: [templates]
      summary: List the signed-in user's message templates
      responses:
        "200":
          description: Template list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateList"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /maler/{type}:
    put:
      operationId: saveTemplate
      tags: [templates]
      summary: Create or update a message template
      parameters:
        - name: type
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TemplateType"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TemplateUpsert"
      responses:
        "200":
          description: Saved template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List customers for the signed-in business
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: source
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Customer list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerList"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Manually add a single customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerCreate"
      responses:
        "201":
          description: Created customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerListItem"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Plan customer limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /trial/status:
    get:
      operationId: getTrialStatus
      tags: [account]
      summary: Current subscription / trial status
      responses:
        "200":
          description: Trial and subscription status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrialStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [account]
      summary: Aggregate platform metrics (admin only)
      responses:
        "200":
          description: Admin statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Not an administrator
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /notification-settings:
    get:
      operationId: getNotificationSettings
      tags: [settings]
      summary: Get notification settings
      responses:
        "200":
          description: Notification settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSettings"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      operationId: updateNotificationSettings
      tags: [settings]
      summary: Update notification settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationSettingsUpdate"
      responses:
        "200":
          description: Updated notification settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSettings"
        "401":
          $ref: "#/components/responses/Unauthorized"
components:
  responses:
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    Me:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          nullable: true
      required:
        - id
        - name
        - email
    AppointmentStatus:
      type: string
      enum:
        - PENDING
        - REMINDED
        - CONFIRMED
        - CANCELLED
        - RESCHEDULE_REQUESTED
    Appointment:
      type: object
      properties:
        id:
          type: string
        clientName:
          type: string
        clientPhone:
          type: string
        scheduledAt:
          type: string
          format: date-time
        reminderAt:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/AppointmentStatus"
        twilioSid:
          type: string
          nullable: true
        customerId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - clientName
        - clientPhone
        - scheduledAt
        - reminderAt
        - status
        - customerId
        - createdAt
        - updatedAt
    AppointmentList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Appointment"
      required:
        - items
    AppointmentActionResult:
      type: object
      properties:
        id:
          type: string
        scheduledAt:
          type: string
          format: date-time
        reminderAt:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/AppointmentStatus"
        clientName:
          type: string
        clientPhone:
          type: string
        twilioSid:
          type: string
          nullable: true
      required:
        - id
        - scheduledAt
        - reminderAt
        - status
        - clientName
        - clientPhone
        - twilioSid
    AppointmentUpdate:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/AppointmentStatus"
        scheduledAt:
          type: string
          format: date-time
        reminderAt:
          type: string
          format: date-time
    RemindRequest:
      type: object
      properties:
        message:
          type: string
    AppointmentSummary:
      type: object
      properties:
        id:
          type: string
        scheduledAt:
          type: string
          format: date-time
        reminderAt:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/AppointmentStatus"
        clientName:
          type: string
        twilioSid:
          type: string
          nullable: true
      required:
        - id
        - scheduledAt
        - reminderAt
        - status
        - clientName
        - twilioSid
    CustomerDetail:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        source:
          type: string
          nullable: true
        externalId:
          type: string
          nullable: true
        appointmentCount:
          type: integer
        lastVisitAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        appointments:
          type: array
          items:
            $ref: "#/components/schemas/AppointmentSummary"
      required:
        - id
        - name
        - phone
        - email
        - source
        - externalId
        - appointmentCount
        - lastVisitAt
        - createdAt
        - appointments
    StatsPeriod:
      type: object
      properties:
        sent:
          type: integer
        confirmed:
          type: integer
        cancelled:
          type: integer
        rescheduleRequested:
          type: integer
        noResponse:
          type: integer
      required:
        - sent
        - confirmed
        - cancelled
        - rescheduleRequested
        - noResponse
    StatsRow:
      type: object
      properties:
        date:
          type: string
        sent:
          type: integer
      required:
        - date
        - sent
    StatsResponse:
      type: object
      properties:
        last7d:
          $ref: "#/components/schemas/StatsPeriod"
        last30d:
          $ref: "#/components/schemas/StatsPeriod"
        total:
          $ref: "#/components/schemas/StatsPeriod"
        dailySeries:
          type: array
          items:
            $ref: "#/components/schemas/StatsRow"
      required:
        - last7d
        - last30d
        - total
        - dailySeries
    NotificationSettings:
      type: object
      properties:
        remind48h:
          type: boolean
        remind24h:
          type: boolean
        remind2h:
          type: boolean
        channelSms:
          type: boolean
        channelEmail:
          type: boolean
        autoFollowUp:
          type: boolean
      required:
        - remind48h
        - remind24h
        - remind2h
        - channelSms
        - channelEmail
        - autoFollowUp
    NotificationSettingsUpdate:
      type: object
      properties:
        remind48h:
          type: boolean
        remind24h:
          type: boolean
        remind2h:
          type: boolean
        channelSms:
          type: boolean
        channelEmail:
          type: boolean
        autoFollowUp:
          type: boolean
    OkResult:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok
    ReplyStatusFilter:
      type: string
      enum:
        - all
        - REMINDED
        - CONFIRMED
        - CANCELLED
        - RESCHEDULE_REQUESTED
    ReplyItem:
      type: object
      properties:
        id:
          type: string
        clientName:
          type: string
        clientPhone:
          type: string
        scheduledAt:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/AppointmentStatus"
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - clientName
        - clientPhone
        - scheduledAt
        - status
        - updatedAt
    ReplyList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ReplyItem"
        total:
          type: integer
      required:
        - items
        - total
    ReplyUpdate:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/AppointmentStatus"
        action:
          type: string
          enum:
            - update_status
            - send_followup
    TemplateType:
      type: string
      enum:
        - reminder_24h
        - reminder_2h
        - confirmation
    TemplateLanguage:
      type: string
      enum:
        - "no"
        - en
    Template:
      type: object
      properties:
        id:
          type: string
        type:
          $ref: "#/components/schemas/TemplateType"
        language:
          $ref: "#/components/schemas/TemplateLanguage"
        body:
          type: string
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - type
        - language
        - body
        - updatedAt
    TemplateList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Template"
      required:
        - items
    TemplateUpsert:
      type: object
      properties:
        language:
          $ref: "#/components/schemas/TemplateLanguage"
        body:
          type: string
      required:
        - language
        - body
    CustomerListItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        source:
          type: string
          nullable: true
        externalId:
          type: string
          nullable: true
        appointmentCount:
          type: integer
        lastVisitAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - phone
        - email
        - source
        - externalId
        - appointmentCount
        - lastVisitAt
        - createdAt
    CustomerList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CustomerListItem"
        total:
          type: integer
        limit:
          type: integer
          nullable: true
      required:
        - items
        - total
        - limit
    CustomerCreate:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
      required:
        - name
    TrialStatus:
      type: object
      properties:
        trialActive:
          type: boolean
        trialEndsAt:
          type: string
          format: date-time
          nullable: true
        paymentMethodCollected:
          type: boolean
        subscriptionStatus:
          type: string
          nullable: true
        plan:
          type: string
          nullable: true
        maxCustomers:
          type: integer
          nullable: true
      required:
        - trialActive
        - trialEndsAt
        - paymentMethodCollected
        - subscriptionStatus
        - plan
        - maxCustomers
    AdminStats:
      type: object
      properties:
        totalUsers:
          type: integer
        bannedUsers:
          type: integer
        newUsers7d:
          type: integer
        activeSubscriptions:
          type: integer
        trialingUsers:
          type: integer
        totalCustomers:
          type: integer
        totalAppointments:
          type: integer
        appointmentsByStatus:
          type: object
          additionalProperties:
            type: integer
      required:
        - totalUsers
        - bannedUsers
        - newUsers7d
        - activeSubscriptions
        - trialingUsers
        - totalCustomers
        - totalAppointments
        - appointmentsByStatus
