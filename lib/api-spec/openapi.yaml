openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: appointments
    description: Appointment operations
  - name: customers
    description: Customer operations
  - name: stats
    description: Statistics operations
  - name: settings
    description: Notification settings
  - name: account
    description: Account operations
  - name: replies
    description: Customer reply operations
  - name: templates
    description: Message template operations
  - name: lokalradar
    description: LokalRadar competitor monitoring & marketing operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /me:
    get:
      operationId: getMe
      tags: [account]
      summary: Current signed-in user
      responses:
        "200":
          description: The authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      operationId: deleteAccount
      tags: [account]
      summary: Permanently delete the signed-in user's account
      responses:
        "200":
          description: Account deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /appointments:
    get:
      operationId: listAppointments
      tags: [appointments]
      summary: List appointments for the signed-in business
      responses:
        "200":
          description: Appointment list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentList"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /appointments/{id}:
    patch:
      operationId: updateAppointment
      tags: [appointments]
      summary: Update an appointment's status or timing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentUpdate"
      responses:
        "200":
          description: Updated appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentActionResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /appointments/{id}/remind:
    post:
      operationId: remindAppointment
      tags: [appointments]
      summary: Send an SMS reminder for an appointment now
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RemindRequest"
      responses:
        "200":
          description: Reminder sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentActionResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: SMS delivery failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Customer detail with appointment history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Customer detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Reminder & response statistics
      responses:
        "200":
          description: Statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /svar:
    get:
      operationId: listReplies
      tags: [replies]
      summary: List customer replies to reminders
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ReplyStatusFilter"
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Reply list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplyList"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /svar/{id}:
    patch:
      operationId: updateReply
      tags: [replies]
      summary: Update a reply's status or send a follow-up
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplyUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: SMS delivery failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /maler:
    get:
      operationId: listTemplates
      tags: [templates]
      summary: List the signed-in user's message templates
      responses:
        "200":
          description: Template list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateList"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /maler/{type}:
    put:
      operationId: saveTemplate
      tags: [templates]
      summary: Create or update a message template
      parameters:
        - name: type
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TemplateType"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TemplateUpsert"
      responses:
        "200":
          description: Saved template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List customers for the signed-in business
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: source
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Customer list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerList"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Manually add a single customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerCreate"
      responses:
        "201":
          description: Created customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerListItem"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Plan customer limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /trial/status:
    get:
      operationId: getTrialStatus
      tags: [account]
      summary: Current subscription / trial status
      responses:
        "200":
          description: Trial and subscription status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrialStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [account]
      summary: Aggregate platform metrics (admin only)
      responses:
        "200":
          description: Admin statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Not an administrator
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /notification-settings:
    get:
      operationId: getNotificationSettings
      tags: [settings]
      summary: Get notification settings
      responses:
        "200":
          description: Notification settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSettings"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      operationId: updateNotificationSettings
      tags: [settings]
      summary: Update notification settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationSettingsUpdate"
      responses:
        "200":
          description: Updated notification settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSettings"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /lokalradar/overview:
    get:
      operationId: getLokalOverview
      tags: [lokalradar]
      summary: Dashboard summary for LokalRadar
      responses:
        "200":
          description: Overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LokalOverview"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /lokalradar/business:
    get:
      operationId: getLokalBusiness
      tags: [lokalradar]
      summary: Get the signed-in user's business profile
      responses:
        "200":
          description: Business
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LokalBusiness"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      operationId: updateLokalBusiness
      tags: [lokalradar]
      summary: Create or update the business profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LokalBusinessInput"
      responses:
        "200":
          description: Updated business
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LokalBusiness"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /lokalradar/competitors:
    get:
      operationId: listLokalCompetitors
      tags: [lokalradar]
      summary: List tracked competitors
      responses:
        "200":
          description: Competitor list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LokalCompetitorList"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createLokalCompetitor
      tags: [lokalradar]
      summary: Add a competitor to track
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LokalCompetitorInput"
      responses:
        "201":
          description: Created competitor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LokalCompetitor"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Plan competitor limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /lokalradar/competitors/{id}:
    get:
      operationId: getLokalCompetitor
      tags: [lokalradar]
      summary: Competitor detail with snapshots, changes and trends
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Competitor detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LokalCompetitorDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteLokalCompetitor
      tags: [lokalradar]
      summary: Stop tracking a competitor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /lokalradar/alerts:
    get:
      operationId: listLokalAlerts
      tags: [lokalradar]
      summary: List alerts
      responses:
        "200":
          description: Alert list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LokalAlertList"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /lokalradar/alerts/{id}:
    patch:
      operationId: updateLokalAlert
      tags: [lokalradar]
      summary: Mark an alert read or unread
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LokalAlertUpdate"
      responses:
        "200":
          description: Updated alert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LokalAlert"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /lokalradar/generations:
    get:
      operationId: listLokalGenerations
      tags: [lokalradar]
      summary: List AI-generated marketing content
      responses:
        "200":
          description: Generation list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LokalGenerationList"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /lokalradar/competitors/{id}/scan:
    post:
      operationId: scanLokalCompetitor
      tags: [lokalradar]
      summary: Run a scan for a competitor now
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Scan result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LokalScanResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /lokalradar/generate/posts:
    post:
      operationId: generateLokalPosts
      tags: [lokalradar]
      summary: Generate ready-to-post marketing drafts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LokalPostInput"
      responses:
        "200":
          description: Generated posts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LokalPostResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Generation limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /lokalradar/reviews:
    get:
      operationId: listLokalReviews
      tags: [lokalradar]
      summary: List reviews available to the reply assistant
      responses:
        "200":
          description: Review list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LokalReviewList"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createLokalReview
      tags: [lokalradar]
      summary: Manually add a review to reply to
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LokalReviewInput"
      responses:
        "201":
          description: Created review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LokalReview"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /lokalradar/generate/review-reply:
    post:
      operationId: generateLokalReviewReply
      tags: [lokalradar]
      summary: Suggest a professional reply to a review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LokalReviewReplyInput"
      responses:
        "200":
          description: Suggested reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LokalReviewReplyResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Generation limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /lokalradar/generate/post-image:
    post:
      operationId: generateLokalPostImage
      tags: [lokalradar]
      summary: Generate an AI image for a marketing post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LokalPostImageInput"
      responses:
        "200":
          description: Generated image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LokalPostImageResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Generation limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /lokalradar/reviews/import-google:
    post:
      operationId: importLokalGoogleReviews
      tags: [lokalradar]
      summary: Import the user's reviews from their Google profile
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LokalReviewImportResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "400":
          description: Missing Google profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Google integration not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /lokalradar/generate/seo:
    post:
      operationId: generateLokalSeo
      tags: [lokalradar]
      summary: Generate SEO/website suggestions for the user's site
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LokalSeoInput"
      responses:
        "200":
          description: SEO suggestions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LokalSeoResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Generation limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  responses:
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    Me:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          nullable: true
      required:
        - id
        - name
        - email
    AppointmentStatus:
      type: string
      enum:
        - PENDING
        - REMINDED
        - CONFIRMED
        - CANCELLED
        - RESCHEDULE_REQUESTED
    Appointment:
      type: object
      properties:
        id:
          type: string
        clientName:
          type: string
        clientPhone:
          type: string
        scheduledAt:
          type: string
          format: date-time
        reminderAt:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/AppointmentStatus"
        twilioSid:
          type: string
          nullable: true
        customerId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - clientName
        - clientPhone
        - scheduledAt
        - reminderAt
        - status
        - customerId
        - createdAt
        - updatedAt
    AppointmentList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Appointment"
      required:
        - items
    AppointmentActionResult:
      type: object
      properties:
        id:
          type: string
        scheduledAt:
          type: string
          format: date-time
        reminderAt:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/AppointmentStatus"
        clientName:
          type: string
        clientPhone:
          type: string
        twilioSid:
          type: string
          nullable: true
      required:
        - id
        - scheduledAt
        - reminderAt
        - status
        - clientName
        - clientPhone
        - twilioSid
    AppointmentUpdate:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/AppointmentStatus"
        scheduledAt:
          type: string
          format: date-time
        reminderAt:
          type: string
          format: date-time
    RemindRequest:
      type: object
      properties:
        message:
          type: string
    AppointmentSummary:
      type: object
      properties:
        id:
          type: string
        scheduledAt:
          type: string
          format: date-time
        reminderAt:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/AppointmentStatus"
        clientName:
          type: string
        twilioSid:
          type: string
          nullable: true
      required:
        - id
        - scheduledAt
        - reminderAt
        - status
        - clientName
        - twilioSid
    CustomerDetail:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        source:
          type: string
          nullable: true
        externalId:
          type: string
          nullable: true
