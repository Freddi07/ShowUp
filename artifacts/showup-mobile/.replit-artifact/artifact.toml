kind = "mobile"
previewPath = "/mobile/"
title = "ShowUp Mobile"
version = "1.0.0"
id = "artifacts/showup-mobile"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/mobile/" ]
localPort = 18958

[services.development]
run = "pnpm --filter @workspace/showup-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/showup-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/showup-mobile", "run", "serve" ]

[services.env]
PORT = "18958"
BASE_PATH = "/mobile/"
