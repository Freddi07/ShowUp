kind = "web"
previewPath = "/"
title = "ShowUp"
version = "1.0.0"
id = "artifacts/showup"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20192

[services.development]
run = "pnpm --filter @workspace/showup run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/showup", "run", "build" ]
serve = "static"
publicDir = "artifacts/showup/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20192"
BASE_PATH = "/"
